version: "3.9"

name: hrms-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: hrms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4

    container_name: hrms-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hrms.local
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine

    container_name: hrms-redis

    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  redis-insight:
    image: redis/redisinsight:latest

    container_name: hrms-redis-insight

    restart: unless-stopped

    ports:
      - "5540:5540"

    depends_on:
      - redis

  mailpit:
    image: axllent/mailpit

    container_name: hrms-mailpit

    restart: unless-stopped

    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio

    container_name: hrms-minio

    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data: